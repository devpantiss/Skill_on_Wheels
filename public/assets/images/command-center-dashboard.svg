  <g font-family="Inter, Arial" font-weight="700" fill="#eafcff">
    <text x="120" y="55" font-size="30" fill="#ff8a00">SKILL ON WHEELS COMMAND CENTER</text>
    <text x="152" y="160" font-size="18" fill="#9df3ff">Learner growth</text><text x="612" y="160" font-size="18" fill="#9df3ff">Fleet status</text><text x="1112" y="160" font-size="18" fill="#9df3ff">Certification mix</text><text x="152" y="482" font-size="18" fill="#9df3ff">District coverage</text><text x="802" y="482" font-size="18" fill="#9df3ff">Simulation modules</text>
  </g>
</svg>
