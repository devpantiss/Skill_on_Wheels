<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Smart learning command center</title>
  <desc id="desc">A floating holographic dashboard for Skill on Wheels fleet, learners, routes and certifications.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#11233b" stop-opacity=".86"/><stop offset="1" stop-color="#050a12" stop-opacity=".94"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="1000" fill="#050a12"/>
  <g opacity=".13" stroke="#00d4ff"><path d="M0 100H1600M0 200H1600M0 300H1600M0 400H1600M0 500H1600M0 600H1600M0 700H1600M0 800H1600M0 900H1600"/><path d="M100 0V1000M200 0V1000M300 0V1000M400 0V1000M500 0V1000M600 0V1000M700 0V1000M800 0V1000M900 0V1000M1000 0V1000M1100 0V1000M1200 0V1000M1300 0V1000M1400 0V1000M1500 0V1000"/></g>
  <rect x="80" y="70" width="1440" height="860" rx="26" fill="url(#panel)" stroke="#00d4ff" stroke-opacity=".55"/>
  <rect x="120" y="120" width="420" height="280" rx="18" fill="#071220" stroke="#00d4ff" stroke-opacity=".45"/>
  <rect x="580" y="120" width="460" height="280" rx="18" fill="#071220" stroke="#00d4ff" stroke-opacity=".45"/>
  <rect x="1080" y="120" width="360" height="280" rx="18" fill="#071220" stroke="#00d4ff" stroke-opacity=".45"/>
  <rect x="120" y="440" width="610" height="410" rx="18" fill="#071220" stroke="#00d4ff" stroke-opacity=".45"/>
  <rect x="770" y="440" width="670" height="410" rx="18" fill="#071220" stroke="#00d4ff" stroke-opacity=".45"/>
  <g filter="url(#glow)">
    <path d="M180 330 C250 190 365 250 420 162" fill="none" stroke="#00d4ff" stroke-width="8"/>
    <path d="M180 345 C265 270 350 324 480 230" fill="none" stroke="#ff8a00" stroke-width="8"/>
    <circle cx="420" cy="162" r="12" fill="#00d4ff"/><circle cx="480" cy="230" r="12" fill="#ff8a00"/>
    <path d="M620 330 H1000M620 285 H930M620 240 H975M620 195 H880" stroke="#00d4ff" stroke-width="12" opacity=".52"/>
    <circle cx="1260" cy="260" r="96" fill="none" stroke="#00d4ff" stroke-width="16" stroke-dasharray="360 160"/>
    <circle cx="1260" cy="260" r="62" fill="none" stroke="#ff8a00" stroke-width="10" stroke-dasharray="210 130"/>
    <path d="M190 752 315 598 430 690 545 538 675 624" fill="none" stroke="#00d4ff" stroke-width="8"/>
    <path d="M840 744 H1330M840 694 H1250M840 644 H1375M840 594 H1180M840 544 H1310" stroke="#b9f8ff" stroke-width="14" opacity=".46"/>
