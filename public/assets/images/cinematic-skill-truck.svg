    <path d="M804 70 H908 C930 70 947 84 954 104 L985 205 H848Z" fill="#9df3ff" opacity=".3"/>
    <rect x="105" y="52" width="580" height="156" rx="12" fill="#06111f"/>
    <text x="135" y="108" fill="#e9fbff" font-family="Space Grotesk, Arial" font-size="54" font-weight="700">SKILL ON WHEELS</text>
    <text x="138" y="153" fill="#00d4ff" font-family="Inter, Arial" font-size="24" font-weight="700">AI · AR/VR · MOBILE TRAINING UNIT</text>
    <path d="M120 190 H670" stroke="#ff8a00" stroke-width="7"/>
    <path d="M130 226 C230 185 300 244 390 204 C485 160 560 225 660 184" fill="none" stroke="#00d4ff" stroke-width="4" opacity=".8"/>
