<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cinematic Skill on Wheels truck render</title>
  <desc id="desc">A futuristic blue mobile training truck driving through rural Odisha at sunrise with holographic route overlays.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07101c"/>
      <stop offset=".52" stop-color="#12455a"/>
      <stop offset="1" stop-color="#f28a31"/>
    </linearGradient>
    <linearGradient id="truck" x1="0" x2="1">
      <stop offset="0" stop-color="#071a3f"/>
      <stop offset=".55" stop-color="#0a48a8"/>
      <stop offset="1" stop-color="#0ee8ff"/>
    </linearGradient>
    <radialGradient id="sun" cx=".26" cy=".28" r=".35">
      <stop offset="0" stop-color="#ffe8a8"/>
      <stop offset=".42" stop-color="#ff9a38" stop-opacity=".75"/>
      <stop offset="1" stop-color="#ff9a38" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#sun)"/>
  <path d="M0 575 C240 500 350 565 520 510 C710 450 820 505 1000 455 C1180 405 1340 430 1600 370 L1600 1000 L0 1000Z" fill="#07131e" opacity=".74"/>
  <path d="M0 680 C260 610 430 660 650 590 C820 535 1010 570 1215 505 C1375 454 1500 470 1600 420 L1600 1000 L0 1000Z" fill="#0a1823"/>
  <g opacity=".26" stroke="#aeefff" stroke-width="2">
    <path d="M70 728 C300 650 480 710 690 615 C860 540 1060 615 1270 510 C1420 435 1500 450 1580 410"/>
    <path d="M120 770 C335 698 520 755 720 665 C920 575 1060 650 1260 570"/>
  </g>
  <g filter="url(#glow)" opacity=".92">
    <path d="M310 608 C470 520 640 640 840 520 C990 430 1120 500 1290 410" fill="none" stroke="#00d4ff" stroke-width="5" stroke-dasharray="18 18"/>
    <circle cx="310" cy="608" r="13" fill="#00d4ff"/>
    <circle cx="840" cy="520" r="13" fill="#00d4ff"/>
    <circle cx="1290" cy="410" r="13" fill="#ff8a00"/>
  </g>
  <g transform="translate(250 515)">
